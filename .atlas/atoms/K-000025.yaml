id: K-000025
title: Review request queue caches periodic scans before automatic filters
type: decision
confidence: high
summary: Cache each successful unfiltered periodic GitHub review-request scan in SQLite, then apply filters only to automatic processing so the dashboard loads locally without stale-cache loss on API failures.
details: 'Design: GitHubMonitor fetches the complete review-request list once per periodic poll with error propagation enabled. After a successful fetch, ReviewDatabase.sync_review_requests atomically upserts the current rows and removes requests absent from the new snapshot; a successful empty result clears the queue. A failed fetch never calls sync, preserving the last known snapshot. Repository and author filters are applied in memory only after the complete snapshot is stored, so they still control automatic review selection without hiding attention items. GET /api/review-requests reads SQLite and computes not_reviewed, reviewed, or awaiting_decision from existing pr_reviews and pending_approvals. On-demand review still revalidates the request against GitHub before running GitHubMonitor.review_pr_on_demand. The review_requests table is an operational cache and does not feed analytics.'
