id: K-000019
title: Constructor-time asyncio locks can bind to the wrong loop in Python 3.9
type: gotcha
confidence: high
summary: Do not create `asyncio.Lock()` in synchronous constructors for long-lived service objects that will be used after `asyncio.run()` starts. In this project, `LLMIntegration` and `GitHubMonitor` must create their locks lazily inside the running loop, otherwise concurrent review serialization can fail with `Future attached to a different loop`.
details: |-
  The failure surfaced when assigned-PR monitoring and own-PR monitoring shared one `LLMIntegration` instance. The first review acquired a lock created before the runtime loop existed, and a second review waiting on that lock raised a cross-loop future error. The fix is to store `None` in `__init__`, then create or refresh the lock in a helper that calls `asyncio.get_running_loop()`. Regression coverage should include objects constructed before the loop starts and then exercised via `asyncio.run()`.

  Related files:
  - `src/code_reviewer/llm_integration.py`
  - `src/code_reviewer/github_monitor.py`
  - `tests/test_review_serialization.py`
