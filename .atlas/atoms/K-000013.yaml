id: K-000013
title: 'Web dashboard: FastAPI with Jinja2 template and shared stylesheet'
type: note
confidence: high
summary: The dashboard UI is served by FastAPI with a real Jinja2 template at src/code_reviewer/templates/dashboard.html and a shared stylesheet at src/code_reviewer/static/css/style.css. Visual changes should stay in those two files, keep API routes and DOM ids stable, and treat the analytics tab as the readability baseline for spacing, grouping, and hierarchy.
details: |-
  ## Current structure

  - `GET /` renders `dashboard.html` through `Jinja2Templates`
  - `/static` serves `src/code_reviewer/static/`
  - The main visual surface is now split cleanly between:
    - template markup and client-side fetch/render logic in `src/code_reviewer/templates/dashboard.html`
    - the dashboard design system in `src/code_reviewer/static/css/style.css`

  ## Readability pattern

  For visual-only refreshes:
  - prefer shared CSS classes over inline styles inside JS-generated HTML
  - preserve existing DOM ids, endpoint URLs, and button handlers so queue actions keep working
  - use the analytics tab as the strongest reference for visual hierarchy, spacing, and card grouping

  ## Practical implication

  UI improvements are safest when they avoid changing fetch logic or approval workflows and instead focus on markup-level class cleanup plus stylesheet consolidation.
