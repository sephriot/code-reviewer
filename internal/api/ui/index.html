<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Control Desk — Reviewd</title>
  <style>
    :root { --ink:#e8e4d9; --muted:#9f9a8e; --paper:#181917; --panel:#22231f; --line:#45473d; --signal:#e8ff58; --danger:#ff6b4a; --blue:#6d9cff; --mono:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; --display:Georgia, 'Times New Roman', serif; }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; color:var(--ink); background:var(--paper); font-family:var(--mono); font-size:14px; line-height:1.45; }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.17; background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px); background-size:36px 36px; mask-image:linear-gradient(to bottom,black,transparent 78%); }
    button { font:inherit; }
    button:focus-visible, a:focus-visible { outline:3px solid var(--signal); outline-offset:3px; }
    .frame { position:relative; min-height:100vh; display:grid; grid-template-rows:auto 1fr auto; max-width:1600px; margin:auto; border-inline:1px solid var(--line); }
    header { display:flex; align-items:end; justify-content:space-between; gap:24px; padding:28px clamp(20px,4vw,64px) 20px; border-bottom:1px solid var(--line); }
    .eyebrow { margin:0 0 6px; color:var(--signal); font-size:11px; font-weight:700; letter-spacing:.14em; }
    h1 { margin:0; font:clamp(34px,5vw,66px)/.88 var(--display); letter-spacing:-.055em; text-transform:uppercase; }
    .status { margin:0; padding:6px 10px; border:1px solid var(--line); color:var(--muted); font-size:11px; letter-spacing:.09em; text-transform:uppercase; white-space:nowrap; }
    .status[data-state="ready"] { color:var(--signal); border-color:var(--signal); }
    main { display:grid; grid-template-columns:minmax(290px,.84fr) minmax(0,1.6fr); min-height:0; }
    section { min-width:0; padding:clamp(20px,3vw,42px); }
    .inbox { border-right:1px solid var(--line); }
    .section-head { display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:18px; }
    h2 { margin:0; color:var(--muted); font-size:11px; letter-spacing:.14em; text-transform:uppercase; }
    .count { color:var(--signal); font-size:12px; }
    .notice { margin:0; color:var(--muted); }
    .notice[role="alert"] { color:var(--danger); }
    .items, .timeline { display:grid; gap:9px; margin:0; padding:0; list-style:none; }
    .inbox-item { width:100%; display:grid; grid-template-columns:auto 1fr; gap:10px; text-align:left; color:inherit; background:transparent; border:1px solid var(--line); padding:13px; cursor:pointer; transition:transform .15s ease,background .15s ease,border-color .15s ease; }
    .inbox-item:hover { transform:translateX(3px); background:var(--panel); border-color:var(--muted); }
    .inbox-item[aria-current="true"] { background:var(--signal); color:#161713; border-color:var(--signal); }
    .mark { width:8px; height:8px; margin-top:5px; background:var(--danger); box-shadow:0 0 16px var(--danger); }
    .inbox-item[aria-current="true"] .mark { background:#161713; box-shadow:none; }
    .item-top { display:flex; justify-content:space-between; gap:9px; font-size:11px; }
    .item-pr { overflow:hidden; font-weight:700; text-overflow:ellipsis; white-space:nowrap; }
    .item-time { color:inherit; opacity:.72; white-space:nowrap; }
    .item-detail { margin-top:5px; overflow:hidden; color:inherit; opacity:.76; font-size:12px; text-overflow:ellipsis; white-space:nowrap; }
    .detail { background:linear-gradient(135deg,rgba(109,156,255,.08),transparent 45%); }
    .selected { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:16px; align-items:start; margin-bottom:30px; padding:18px 0; border-block:1px solid var(--line); }
    .selected h3 { margin:4px 0 0; font:clamp(25px,4vw,48px)/.95 var(--display); letter-spacing:-.04em; word-break:break-word; }
    .selected-meta { color:var(--muted); font-size:11px; }
    .pill { padding:4px 7px; color:var(--blue); border:1px solid currentColor; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
    .event { position:relative; display:grid; grid-template-columns:13px minmax(0,1fr); gap:13px; padding-bottom:18px; }
    .event:not(:last-child)::before { content:""; position:absolute; left:4px; top:12px; bottom:-1px; width:1px; background:var(--line); }
    .dot { width:9px; height:9px; margin-top:4px; border:2px solid var(--blue); border-radius:50%; background:var(--paper); }
    .event.current .dot { border-color:var(--signal); background:var(--signal); box-shadow:0 0 14px var(--signal); }
    .event-top { display:flex; justify-content:space-between; gap:12px; color:var(--ink); font-size:12px; }
    .event-detail { margin:3px 0 0; color:var(--muted); font-size:12px; word-break:break-word; }
    footer { display:flex; justify-content:space-between; gap:12px; padding:13px clamp(20px,4vw,64px); color:var(--muted); border-top:1px solid var(--line); font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
    @media (max-width:760px) { main { grid-template-columns:1fr; } .inbox { border-right:0; border-bottom:1px solid var(--line); } header { align-items:start; flex-direction:column; } .status { align-self:flex-start; } }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after { scroll-behavior:auto!important; transition:none!important; } }
  </style>
</head>
<body>
  <div class="frame">
    <header>
      <div><p class="eyebrow">Reviewd / local control plane</p><h1>Control Desk</h1></div>
      <p class="status" id="connection-status" aria-live="polite">Loading read model</p>
    </header>
    <main>
      <section class="inbox" aria-labelledby="inbox-heading">
        <div class="section-head"><h2 id="inbox-heading">Attention queue</h2><span class="count" id="inbox-count">—</span></div>
        <p class="notice" id="inbox-message">Loading durable review state.</p>
        <ul class="items" id="inbox-items" aria-label="Items needing attention"></ul>
      </section>
      <section class="detail" aria-labelledby="timeline-heading">
        <div class="section-head"><h2 id="timeline-heading">Evidence timeline</h2><span class="pill">Read only</span></div>
        <div class="selected" id="selected-pr" hidden><div><div class="selected-meta" id="selected-connection"></div><h3 id="selected-title"></h3></div><span class="pill" id="selected-state"></span></div>
        <p class="notice" id="timeline-message">Choose inbox item to inspect immutable evidence.</p>
        <ol class="timeline" id="timeline-items" aria-label="Selected pull request timeline"></ol>
      </section>
    </main>
    <footer><span>publication disabled</span><span>no mutation controls until authentication</span></footer>
  </div>
  <script>
    (() => {
      const inbox = document.querySelector('#inbox-items');
      const inboxMessage = document.querySelector('#inbox-message');
      const inboxCount = document.querySelector('#inbox-count');
      const connection = document.querySelector('#connection-status');
      const selected = document.querySelector('#selected-pr');
      const selectedConnection = document.querySelector('#selected-connection');
      const selectedTitle = document.querySelector('#selected-title');
      const selectedState = document.querySelector('#selected-state');
      const timeline = document.querySelector('#timeline-items');
      const timelineMessage = document.querySelector('#timeline-message');
      const formatTime = (value) => { const date = new Date(value); return Number.isNaN(date.valueOf()) ? 'unknown time' : new Intl.DateTimeFormat(undefined, { dateStyle:'medium', timeStyle:'short' }).format(date); };
      const text = (tag, value, className) => { const node = document.createElement(tag); node.textContent = value || '—'; if (className) node.className = className; return node; };
      const api = async (path) => { const response = await fetch(path, { headers:{Accept:'application/json'} }); if (!response.ok) throw new Error(`Read model returned ${response.status}`); return response.json(); };
      const setConnection = (state, value) => { connection.dataset.state = state; connection.textContent = value; };
      function showTimeline(item) {
        selected.hidden = false; selectedConnection.textContent = item.connection_id; selectedTitle.textContent = item.pull_request_id; selectedState.textContent = item.state;
        timeline.replaceChildren(); timelineMessage.textContent = 'Loading immutable events.'; timelineMessage.removeAttribute('role');
        document.querySelectorAll('.inbox-item').forEach((button) => button.setAttribute('aria-current', String(button.dataset.id === item.id)));
        api(`/api/v1/pull-requests/${encodeURIComponent(item.pull_request_id)}/timeline?connection_id=${encodeURIComponent(item.connection_id)}`).then((page) => {
          timelineMessage.textContent = page.items.length ? '' : 'No immutable events recorded for this selection.';
          page.items.forEach((event) => { const row = document.createElement('li'); row.className = `event${event.current ? ' current' : ''}`; row.append(text('span', '', 'dot')); const content = document.createElement('div'); const top = document.createElement('div'); top.className = 'event-top'; top.append(text('strong', event.kind), text('time', formatTime(event.occurred_at))); content.append(top, text('p', event.detail, 'event-detail')); row.append(content); timeline.append(row); });
        }).catch((error) => { timelineMessage.textContent = error.message; timelineMessage.setAttribute('role', 'alert'); });
      }
      function addInboxItem(item) { const button = document.createElement('button'); button.type = 'button'; button.className = 'inbox-item'; button.dataset.id = item.id; button.setAttribute('aria-current', 'false'); const mark = text('span', '', 'mark'); mark.setAttribute('aria-hidden', 'true'); const content = document.createElement('span'); const top = document.createElement('span'); top.className = 'item-top'; top.append(text('span', item.pull_request_id, 'item-pr'), text('time', formatTime(item.occurred_at), 'item-time')); content.append(top, text('span', item.detail, 'item-detail')); button.append(mark, content); button.addEventListener('click', () => showTimeline(item)); inbox.append(button); }
      api('/api/v1/inbox').then((page) => { const items = page.items || []; inboxCount.textContent = `${items.length} OPEN`; inboxMessage.textContent = items.length ? '' : 'Queue clear. No current review attention.'; items.forEach(addInboxItem); setConnection('ready', 'Read model online'); if (items[0]) showTimeline(items[0]); }).catch((error) => { inboxMessage.textContent = error.message; inboxMessage.setAttribute('role', 'alert'); setConnection('error', 'Read model unavailable'); });
    })();
  </script>
</body>
</html>
